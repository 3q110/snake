<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>萌萌贪吃蛇</title>
  <meta name="version" content="snake.1.2.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #fff5f8;
      --panel: #ffffff;
      --accent: #ff6b9d;
      --accent-dark: #e84d87;
      --snake: #5dd39e;
      --snake-head: #3cb878;
      --food: #ff9f43;
      --text: #4a3f55;
      --muted: #9b8aa8;
      --shadow: 0 8px 24px rgba(255, 107, 157, 0.18);
      --grid-line: rgba(255, 182, 193, 0.35);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100dvh;
      font-family: "Nunito", "Segoe UI", sans-serif;
      background: var(--bg);
      background-image:
        radial-gradient(circle at 10% 20%, #ffe0ec 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, #dff7ec 0%, transparent 40%);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
      user-select: none;
    }

    h1 {
      font-size: clamp(1.5rem, 5vw, 2rem);
      font-weight: 800;
      color: var(--accent);
      text-shadow: 2px 2px 0 #ffd6e5;
      margin-bottom: 8px;
      letter-spacing: 0.02em;
    }

    .hud {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 12px;
    }

    .score-pill {
      background: var(--panel);
      border: 3px solid #ffd6e5;
      border-radius: 999px;
      padding: 6px 18px;
      font-weight: 800;
      font-size: 0.95rem;
      box-shadow: var(--shadow);
    }

    .score-pill span {
      color: var(--accent);
    }

    /* =========================
       音频 HUD（Task 7-4）
       - 最小 UI：静音按钮 + 音量滑杆
       - 不做音频面板，不做设置页
       ========================= */
    .sound-pill {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 14px;
    }

    .sound-btn {
      font: inherit;
      font-weight: 800;
      border: none;
      background: transparent;
      cursor: pointer;
      line-height: 1;
      font-size: 1.15rem;
      padding: 2px 4px;
      color: var(--accent);
      user-select: none;
    }

    .sound-btn:active {
      transform: translateY(1px);
    }

    .volume-slider {
      width: 120px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .difficulty-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 12px;
    }

    .difficulty-bar label {
      width: 100%;
      text-align: center;
      font-size: 0.8rem;
      font-weight: 800;
      color: var(--muted);
    }

    .diff-btn {
      font-family: inherit;
      font-weight: 800;
      font-size: 0.9rem;
      border: 3px solid #ffd6e5;
      border-radius: 999px;
      padding: 8px 16px;
      cursor: pointer;
      background: var(--panel);
      color: var(--text);
      box-shadow: 0 3px 0 #ffc4d8;
      transition: transform 0.1s, box-shadow 0.1s, background 0.15s, color 0.15s;
    }

    .diff-btn:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #ffc4d8;
    }

    .diff-btn.active {
      background: linear-gradient(180deg, #ff8fb8 0%, var(--accent) 100%);
      color: #fff;
      border-color: var(--accent);
      box-shadow: 0 3px 0 var(--accent-dark);
    }

    .diff-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .game-wrap {
      position: relative;
      background: var(--panel);
      border: 4px solid #ffd6e5;
      border-radius: 20px;
      padding: 10px;
      box-shadow: var(--shadow);
    }

    canvas {
      display: block;
      width: 100%;
      max-width: min(800px, calc(100vw - 32px));
      height: auto;
      aspect-ratio: 1;
      border-radius: 12px;
      background: #fffafc;
      touch-action: none;
    }

    .overlay {
      position: absolute;
      inset: 10px;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: rgba(255, 250, 252, 0.88);
      text-align: center;
      padding: 20px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .overlay h2 {
      font-size: 1.4rem;
      color: var(--accent);
    }

    .overlay p {
      color: var(--muted);
      font-weight: 600;
      line-height: 1.5;
      max-width: 260px;
    }

    .btn {
      font-family: inherit;
      font-weight: 800;
      font-size: 1rem;
      border: none;
      border-radius: 999px;
      padding: 12px 28px;
      cursor: pointer;
      background: linear-gradient(180deg, #ff8fb8 0%, var(--accent) 100%);
      color: #fff;
      box-shadow: 0 4px 0 var(--accent-dark);
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .btn:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 var(--accent-dark);
    }

    /* 次要按钮（Task 8：皮肤/成就面板入口） */
    .btn-ghost {
      background: rgba(255, 255, 255, 0.85);
      color: var(--accent);
      border: 3px solid #ffd6e5;
      box-shadow: 0 4px 0 #ffc4d8;
    }

    .btn-ghost:active {
      box-shadow: 0 1px 0 #ffc4d8;
    }

    .overlay-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }

    /* =========================
       皮肤/成就面板（Task 8）
       - 仍然放在 overlay 内：不额外创建页面文件
       - MENU/OVER 可打开；PLAYING/PAUSED 不开放（逻辑在 JS 控制）
       ========================= */
    .profile-panel {
      width: min(520px, calc(100vw - 40px));
      background: rgba(255, 255, 255, 0.92);
      border: 2px solid rgba(255, 214, 229, 0.9);
      border-radius: 16px;
      box-shadow: 0 10px 26px rgba(255, 107, 157, 0.14);
      padding: 12px;
      display: none;
      gap: 10px;
      max-height: min(60dvh, 520px);
      overflow: hidden;
      text-align: left;
    }

    .profile-panel.open {
      display: grid;
      grid-template-rows: auto auto 1fr;
    }

    .panel-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .panel-title {
      font-weight: 800;
      color: var(--text);
      font-size: 0.95rem;
    }

    .panel-close {
      border: none;
      background: transparent;
      cursor: pointer;
      font: inherit;
      font-weight: 800;
      color: var(--muted);
      padding: 2px 6px;
      border-radius: 8px;
    }

    .panel-close:hover {
      background: rgba(255, 214, 229, 0.4);
      color: var(--text);
    }

    .panel-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .tab-btn {
      font: inherit;
      font-weight: 800;
      border: 2px solid rgba(255, 214, 229, 0.9);
      border-radius: 999px;
      padding: 8px 12px;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.92);
      color: var(--text);
    }

    .tab-btn.active {
      background: linear-gradient(180deg, #ff8fb8 0%, var(--accent) 100%);
      border-color: var(--accent);
      color: #fff;
    }

    .panel-body {
      overflow: auto;
      padding-right: 4px; /* 给滚动条留点空间 */
    }

    .panel-list {
      display: grid;
      gap: 10px;
    }

    .panel-item {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 14px;
      border: 2px solid rgba(255, 214, 229, 0.75);
      background: rgba(255, 255, 255, 0.92);
    }

    .panel-item.locked {
      opacity: 0.6;
    }

    .panel-item h4 {
      font-size: 0.95rem;
      color: var(--text);
      margin-bottom: 4px;
    }

    .panel-item p {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.35;
      max-width: none;
    }

    .panel-badge {
      font-weight: 800;
      font-size: 0.82rem;
      padding: 6px 10px;
      border-radius: 999px;
      border: 2px solid rgba(255, 214, 229, 0.9);
      background: rgba(255, 255, 255, 0.95);
      color: var(--text);
      white-space: nowrap;
    }

    .panel-badge.ok {
      border-color: rgba(93, 211, 158, 0.65);
      background: rgba(93, 211, 158, 0.12);
      color: #1f6f52;
    }

    .skin-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .skin-dot {
      width: 14px;
      height: 14px;
      border-radius: 999px;
      border: 2px solid rgba(255, 214, 229, 0.9);
      box-shadow: 0 2px 0 rgba(255, 196, 216, 0.9);
      background: var(--accent);
    }

    .skin-select {
      font: inherit;
      font-weight: 800;
      border: none;
      border-radius: 999px;
      padding: 8px 12px;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.92);
      border: 2px solid rgba(255, 214, 229, 0.9);
      color: var(--text);
    }

    .skin-select.selected {
      background: rgba(255, 107, 157, 0.1);
      border-color: var(--accent);
      color: var(--accent-dark);
    }

    .skin-select:disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }

    .hint {
      margin-top: 12px;
      font-size: 0.85rem;
      color: var(--muted);
      font-weight: 600;
      text-align: center;
    }

    .hint kbd {
      display: inline-block;
      background: #fff;
      border: 2px solid #ffd6e5;
      border-radius: 6px;
      padding: 1px 6px;
      font-family: inherit;
      font-size: 0.8rem;
    }

    .dpad {
      display: none;
      margin-top: 16px;
      grid-template-columns: repeat(3, 64px);
      grid-template-rows: repeat(3, 64px);
      gap: 8px;
      justify-content: center;
    }

    .dpad-btn {
      width: 64px;
      height: 64px;
      border: none;
      border-radius: 16px;
      background: #fff;
      border: 3px solid #ffd6e5;
      font-size: 1.5rem;
      color: var(--accent);
      box-shadow: 0 4px 0 #ffc4d8;
      cursor: pointer;
      touch-action: manipulation;
    }

    .dpad-btn:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #ffc4d8;
      background: #fff0f5;
    }

    .dpad-btn.empty {
      visibility: hidden;
      pointer-events: none;
    }

    /* =========================
       Toast（Task 6-3）
       - 轻提示：暂用于展示拾取道具反馈
       - 纯 DOM，不做成就/皮肤等 UI
       ========================= */
    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%) translateY(12px);
      padding: 10px 14px;
      border-radius: 999px;
      border: 2px solid rgba(255, 214, 229, 0.9);
      background: rgba(255, 255, 255, 0.94);
      color: var(--text);
      font-weight: 800;
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease, transform 0.18s ease;
      z-index: 30;
      max-width: min(520px, calc(100vw - 28px));
      text-align: center;
      line-height: 1.2;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (hover: none) and (pointer: coarse) {
      .dpad { display: grid; }
      .hint-desktop { display: none; }
    }

    @media (min-width: 520px) {
      .dpad { display: none !important; }
    }
  </style>
</head>
<body>
  <h1>🐍 萌萌贪吃蛇</h1>

  <div class="difficulty-bar" role="group" aria-label="难度选择">
    <label>选择难度</label>
    <button type="button" class="diff-btn" data-diff="easy">容易</button>
    <button type="button" class="diff-btn active" data-diff="medium">中等</button>
    <button type="button" class="diff-btn" data-diff="hard">困难</button>
  </div>

  <div class="hud">
    <div class="score-pill">得分 <span id="score">0</span></div>
    <div class="score-pill">最高 <span id="highScore">0</span></div>
    <!-- Task 7-4：最小音频 UI（静音 + 音量） -->
    <div class="score-pill sound-pill" aria-label="音频设置">
      <button type="button" class="sound-btn" id="muteBtn" aria-label="静音切换">🔊</button>
      <input id="volumeSlider" class="volume-slider" type="range" min="0" max="1" step="0.01" value="0.8" aria-label="音量（0~1）" />
    </div>
  </div>

  <div class="game-wrap">
    <canvas id="game" aria-label="贪吃蛇游戏区域"></canvas>

    <div id="overlay" class="overlay visible">
      <h2 id="overlayTitle">准备好了吗？</h2>
      <p id="overlayMsg">用方向键或 WASD 移动小蛇，吃到苹果会变长哦～</p>
      <div class="overlay-actions">
        <button type="button" class="btn" id="actionBtn">开始游戏</button>
        <button type="button" class="btn btn-ghost" id="panelBtn" aria-label="打开皮肤与成就面板">皮肤/成就</button>
      </div>

      <!-- Task 8：仍在 overlay 内的“皮肤/成就”面板（不另开页面） -->
      <div id="profilePanel" class="profile-panel" aria-label="皮肤与成就面板">
        <div class="panel-top">
          <div class="panel-title">玩家档案</div>
          <button type="button" class="panel-close" id="panelCloseBtn" aria-label="关闭面板">✕</button>
        </div>
        <div class="panel-tabs" role="tablist" aria-label="面板切换">
          <button type="button" class="tab-btn active" id="tabBtnSkins" data-tab="skins" role="tab" aria-selected="true">皮肤</button>
          <button type="button" class="tab-btn" id="tabBtnAchievements" data-tab="achievements" role="tab" aria-selected="false">成就</button>
        </div>
        <div class="panel-body">
          <div id="panelSkins" class="panel-list" aria-label="皮肤列表"></div>
          <div id="panelAchievements" class="panel-list" aria-label="成就列表" style="display:none"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast（Task 6-3）：轻提示容器（默认隐藏） -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <p class="hint hint-desktop">键盘：<kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> 或 <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> · <kbd>空格</kbd> 暂停</p>

  <div class="dpad" id="dpad" aria-label="方向控制">
    <button type="button" class="dpad-btn empty" tabindex="-1" aria-hidden="true"></button>
    <button type="button" class="dpad-btn" data-dir="up" aria-label="向上">▲</button>
    <button type="button" class="dpad-btn empty" tabindex="-1" aria-hidden="true"></button>
    <button type="button" class="dpad-btn" data-dir="left" aria-label="向左">◀</button>
    <button type="button" class="dpad-btn empty" tabindex="-1" aria-hidden="true"></button>
    <button type="button" class="dpad-btn" data-dir="right" aria-label="向右">▶</button>
    <button type="button" class="dpad-btn empty" tabindex="-1" aria-hidden="true"></button>
    <button type="button" class="dpad-btn" data-dir="down" aria-label="向下">▼</button>
    <button type="button" class="dpad-btn empty" tabindex="-1" aria-hidden="true"></button>
  </div>

  <script>
    const GRID = 20;
    const CELL = 40;
    const CANVAS_SIZE = GRID * CELL;
    const FOOD_SCORE = 10;

    const DIFFICULTY = {
      easy:   { label: "容易", initialSpeed: 380, minSpeed: 200, speedStep: 2 },
      medium: { label: "中等", initialSpeed: 300, minSpeed: 160, speedStep: 4 },
      hard:   { label: "困难", initialSpeed: 220, minSpeed: 120, speedStep: 6 },
    };

    // =========================
    // 存档 / 工具（Task 2）
    // =========================
    // 说明：
    // - profile：玩家档案（统计/皮肤/成就等，后续任务会持续扩展）
    // - audioSettings：音频设置（muted/volume，后续任务再做 UI 按钮）
    const STORAGE_KEYS = {
      profile: "snake_profile_v1",
      audio: "snake_audio_settings_v1",
    };

    // =========================
    // Task 8：成就与皮肤常量表
    // - ACHIEVEMENTS：约 8 个成就（含部分与皮肤解锁联动）
    // - SKINS：6 套皮肤（default + 5 可解锁）
    // 说明：
    // - 这里不改动核心规则，只做“档案/展示/渲染换色”层面的扩展
    // =========================
    const SKINS = [
      { id: "default", name: "薄荷绿", desc: "初始皮肤，清清爽爽～", hueBase: 140 },
      { id: "mint", name: "薄荷奶糖", desc: "第一次吃到食物就送你～", hueBase: 158 },
      { id: "lemon", name: "柠檬汽水", desc: "一局吃到 10 个食物解锁", hueBase: 68 },
      { id: "ocean", name: "海盐气泡", desc: "本局得分 ≥ 100 解锁", hueBase: 196 },
      { id: "violet", name: "紫晶护盾", desc: "护盾救命一次解锁", hueBase: 272 },
      { id: "galaxy", name: "银河糖纸", desc: "一局拾取 3 个道具解锁", hueBase: 310 },
    ];

    const ACHIEVEMENTS = [
      { id: "a_first_bite", name: "第一口！", desc: "本局吃到 1 个食物", unlockSkins: ["mint"] },
      { id: "a_feast_10", name: "小小大胃王", desc: "本局吃到 10 个食物", unlockSkins: ["lemon"] },
      { id: "a_score_100", name: "冲鸭 100 分", desc: "本局得分达到 100", unlockSkins: ["ocean"] },
      { id: "a_powerup_3", name: "道具收藏家", desc: "本局拾取 3 个道具", unlockSkins: ["galaxy"] },
      { id: "a_shield_save", name: "护盾救命！", desc: "护盾成功抵消一次碰撞", unlockSkins: ["violet"] },
      { id: "a_double_3", name: "双倍连吃", desc: "双倍分期间吃到 3 个食物" },
      { id: "a_veteran_10", name: "老玩家", desc: "累计完成 10 局游戏" },
      { id: "a_total_food_50", name: "吃吃吃！", desc: "累计吃到 50 个食物" },
    ];

    /**
     * 读取 localStorage JSON
     * @param {string} key
     * @param {any} fallback 读取失败或为空时的回退值
     */
    function loadJSON(key, fallback) {
      try {
        const raw = localStorage.getItem(key);
        if (!raw) return fallback;
        return JSON.parse(raw);
      } catch {
        return fallback;
      }
    }

    /**
     * 保存 localStorage JSON
     * @param {string} key
     * @param {any} obj
     */
    function saveJSON(key, obj) {
      try {
        localStorage.setItem(key, JSON.stringify(obj));
      } catch {
        // 某些隐私模式/禁用存储环境下可能抛错：这里静默降级，不阻断游戏
      }
    }

    function defaultProfile() {
      return {
        version: 1,
        stats: {
          gamesPlayed: 0,
          totalScore: 0,
          totalFood: 0,
          totalPowerups: 0,
          maxScoreEver: 0,
          maxFoodOneGame: 0,
          shieldSaves: 0,
        },
        unlockedAchievements: [],
        unlockedSkins: ["default"],
        selectedSkin: "default",
      };
    }

    /**
     * 规范化（校验/修正）音频设置：
     * - muted 必须是 boolean
     * - volume clamp 到 [0,1]
     */
    function defaultAudioSettings() {
      return { muted: false, volume: 0.8 };
    }

    function normalizeAudioSettings(s) {
      if (typeof s?.muted !== "boolean") return defaultAudioSettings();
      const v = Number(s.volume ?? 0.8);
      return { muted: s.muted, volume: Math.max(0, Math.min(1, v)) };
    }

    // 页面加载时初始化 profile 与 audioSettings
    // - 若旧数据结构不匹配，则回退默认
    // - 初始化后立即保存一次，确保刷新页面能在 localStorage 里看到两个 key
    let profile = loadJSON(STORAGE_KEYS.profile, defaultProfile());
    if (!profile || profile.version !== 1) profile = defaultProfile();
    function saveProfile() { saveJSON(STORAGE_KEYS.profile, profile); }

    let audioSettings = normalizeAudioSettings(loadJSON(STORAGE_KEYS.audio, defaultAudioSettings()));
    function saveAudioSettings() { saveJSON(STORAGE_KEYS.audio, audioSettings); }

    // 保证初次打开就落盘（方便手动验证：localStorage 里应出现两个 key）
    saveProfile();
    saveAudioSettings();

    // - 同时更新 CSS 变量（让 toast、按钮点缀色也跟着变化）
    // =========================
    function clamp01(n) { return Math.max(0, Math.min(1, Number(n) || 0)); }

    function hslToRgb(h, s, l) {
      // h: 0~360, s/l: 0~1
      const H = ((h % 360) + 360) % 360;
      const S = clamp01(s);
      const L = clamp01(l);
      const C = (1 - Math.abs(2 * L - 1)) * S;
      const hp = H / 60;
      const X = C * (1 - Math.abs((hp % 2) - 1));
      let r1 = 0, g1 = 0, b1 = 0;
      if (hp >= 0 && hp < 1) [r1, g1, b1] = [C, X, 0];
      else if (hp < 2) [r1, g1, b1] = [X, C, 0];
      else if (hp < 3) [r1, g1, b1] = [0, C, X];
      else if (hp < 4) [r1, g1, b1] = [0, X, C];
      else if (hp < 5) [r1, g1, b1] = [X, 0, C];
      else [r1, g1, b1] = [C, 0, X];
      const m = L - C / 2;
      const r = Math.round((r1 + m) * 255);
      const g = Math.round((g1 + m) * 255);
      const b = Math.round((b1 + m) * 255);
      return { r, g, b };
    }

    function rgbaFromHsl(h, s, l, a = 1) {
      const { r, g, b } = hslToRgb(h, s, l);
      return `rgba(${r}, ${g}, ${b}, ${clamp01(a)})`;
    }

        food: `hsl(${(h + 55) % 360}, 86%, 55%)`,
        accent: `hsl(${(h + 320) % 360}, 88%, 60%)`,
        accentDark: `hsl(${(h + 320) % 360}, 88%, 50%)`,
        snakeLink: `hsl(${(h + 6) % 360}, 74%, 48%)`,
      };

      const life = Number(opts.life ?? 900); // ms
      floatingTexts.push({
        text,
        x,
        y,
        vy: Number(opts.vy ?? -72), // px/s（向上漂）
        age: 0,
        life,
        alpha: 1,
        color: opts.color || cssVar("--accent", "#ff6b9d"),
        scale: Number(opts.scale ?? 1),
      });
    }

    function updateAndDrawFloatingTexts(dt = 16) {
      if (!floatingTexts.length) return;
      const dtSec = dt / 1000;
      floatingTexts.forEach((t) => {
        t.age += dt;
        t.y += t.vy * dtSec;
        const p = Math.min(1, t.age / t.life);
        // 先稳住，再淡出
        t.alpha = p < 0.7 ? 1 : Math.max(0, 1 - (p - 0.7) / 0.3);
      });
      floatingTexts = floatingTexts.filter((t) => t.age < t.life && t.alpha > 0.001);

      // 绘制（放到最上层）
      ctx.save();
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      const baseSize = Math.max(12, Math.floor(CELL * 0.42));
      ctx.font = `800 ${baseSize}px "Nunito", "Segoe UI", sans-serif`;
      ctx.shadowColor = "rgba(255, 107, 157, 0.25)";

      ctx.shadowOffsetY = 2;

      floatingTexts.forEach((t) => {
        ctx.save();
        ctx.globalAlpha = t.alpha;
        ctx.fillStyle = t.color;
        ctx.fillText(t.text, t.x, t.y);
        ctx.restore();
      });
      ctx.restore();
    }

    // =========================
    // WebAudio（Task 7-1）
    // - 增加 masterGain：audio.master
    // - playTone / playChomp 的输出统一接到 master
    // - ensureAudio() 每次调用都会根据 audioSettings 更新 master.gain
    // =========================
    const audio = { ctx: null, master: null };

    function ensureAudio() {
      if (!audio.ctx) {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (Ctx) audio.ctx = new Ctx();
      }
      if (!audio.ctx) return;

      // 第一次初始化：创建 masterGain 并连接到 destination
      if (!audio.master) {
        audio.master = audio.ctx.createGain();
        audio.master.gain.setValueAtTime(1, audio.ctx.currentTime);
        audio.master.connect(audio.ctx.destination);
      }

      if (audio.ctx.state === "suspended") audio.ctx.resume();

      // 每次 ensureAudio 都同步设置（UI 改动立刻生效）
      const v = audioSettings?.muted ? 0 : (audioSettings?.volume ?? 1);
      const target = Math.max(0, Math.min(1, Number(v)));
      // 轻微平滑，避免突兀爆音
      audio.master.gain.setTargetAtTime(target, audio.ctx.currentTime, 0.015);
    }

    function playTone(freq, duration, type = "sine", volume = 0.15, when = 0) {
      if (!audio.ctx || !audio.master) return;
      const finalVolume = Math.max(0, Number(volume) || 0);
      if (finalVolume <= 0.0001) return;
      const t = audio.ctx.currentTime + when;
      const osc = audio.ctx.createOscillator();
      const gain = audio.ctx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, t);
      gain.gain.setValueAtTime(finalVolume, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
      osc.connect(gain);
      gain.connect(audio.master);
      osc.start(t);
      osc.stop(t + duration + 0.02);
    }

    function playChomp(volume = 0.18, when = 0) {
      if (!audio.ctx || !audio.master) return;
      const finalVolume = Math.max(0, Number(volume) || 0);
      if (finalVolume <= 0.0001) return;
      const ctx = audio.ctx;
      const t0 = ctx.currentTime + when;
      const out = ctx.createGain();
      out.gain.setValueAtTime(1, t0);
      out.connect(audio.master);

      const thunkOsc = ctx.createOscillator();
      const thunkGain = ctx.createGain();
      thunkOsc.type = "sine";
      thunkOsc.frequency.setValueAtTime(160, t0);
      thunkOsc.frequency.exponentialRampToValueAtTime(85, t0 + 0.13);
      thunkGain.gain.setValueAtTime(0.001, t0);
      thunkGain.gain.exponentialRampToValueAtTime(finalVolume * 0.95, t0 + 0.01);
      thunkGain.gain.exponentialRampToValueAtTime(0.001, t0 + 0.18);
      thunkOsc.connect(thunkGain);
      thunkGain.connect(out);
      thunkOsc.start(t0);
      thunkOsc.stop(t0 + 0.22);

      const clickOsc = ctx.createOscillator();
      const clickGain = ctx.createGain();
      clickOsc.type = "square";
      clickOsc.frequency.setValueAtTime(1200, t0);
      clickGain.gain.setValueAtTime(0.001, t0);
      clickGain.gain.exponentialRampToValueAtTime(finalVolume * 0.22, t0 + 0.002);
      clickGain.gain.exponentialRampToValueAtTime(0.001, t0 + 0.03);
      clickOsc.connect(clickGain);
      clickGain.connect(out);
      clickOsc.start(t0);
      clickOsc.stop(t0 + 0.05);

      const noiseLen = Math.max(1, Math.floor(ctx.sampleRate * 0.14));
      const noiseBuf = ctx.createBuffer(1, noiseLen, ctx.sampleRate);
      const data = noiseBuf.getChannelData(0);
      for (let i = 0; i < noiseLen; i++) {
        const e = 1 - i / noiseLen;
        data[i] = (Math.random() * 2 - 1) * Math.pow(e, 0.35);
      }

      const noise = ctx.createBufferSource();
      const band = ctx.createBiquadFilter();
      const low = ctx.createBiquadFilter();
      const noiseGain = ctx.createGain();
      noise.buffer = noiseBuf;
      band.type = "bandpass";
      band.frequency.setValueAtTime(950, t0);
      band.frequency.exponentialRampToValueAtTime(520, t0 + 0.12);
      band.Q.setValueAtTime(0.9, t0);
      low.type = "lowpass";
      low.frequency.setValueAtTime(2200, t0);
      low.frequency.exponentialRampToValueAtTime(1050, t0 + 0.14);
      low.Q.setValueAtTime(0.7, t0);
      noiseGain.gain.setValueAtTime(0.001, t0);
      noiseGain.gain.exponentialRampToValueAtTime(finalVolume * 0.72, t0 + 0.01);
      noiseGain.gain.exponentialRampToValueAtTime(0.001, t0 + 0.16);
      noise.connect(band);
      band.connect(low);
      low.connect(noiseGain);
      noiseGain.connect(out);
      noise.start(t0);
      noise.stop(t0 + 0.18);
    }

    /**

     * @param {number} volume 0~1
     * @param {number} when 相对延迟（秒）

    function sfxCuteArp(volume = 0.12, when = 0) {
      // 轻快大调上行：不要太长，避免吃食物时过吵
      const base = [659, 784, 988, 1175]; // E5 G5 B5 D6（接近，略偏可爱）
      base.forEach((f, i) => playTone(f, 0.06, "sine", volume * 0.65, when + i * 0.055));
      playTone(1319, 0.09, "triangle", volume * 0.5, when + base.length * 0.055);
    }

    /**
     * 泡泡啵：用于「护盾救命」「拾取护盾」等 Q 弹反馈
     * @param {number} volume 0~1
     * @param {number} when 相对延迟（秒）
     */
    function sfxBubblePop(volume = 0.12, when = 0) {
      if (!audio.ctx || !audio.master) return;
      const ctx = audio.ctx;
      const t0 = ctx.currentTime + when;
      const v = Math.max(0, Number(volume) || 0);
      if (v <= 0.0001) return;

      // 主体“啵”一下：高音瞬间 + 低音回弹
      playTone(760, 0.028, "sine", v * 0.55, when);
      playTone(260, 0.09, "triangle", v * 0.35, when + 0.01);

      // 轻微噪声，模拟泡泡破裂的气流
      const len = Math.max(1, Math.floor(ctx.sampleRate * 0.055));
      const buf = ctx.createBuffer(1, len, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < len; i++) {
        const e = 1 - i / len;
        data[i] = (Math.random() * 2 - 1) * Math.pow(e, 0.7);
      }
      const src = ctx.createBufferSource();
      src.buffer = buf;
      const lp = ctx.createBiquadFilter();
      lp.type = "lowpass";
      lp.frequency.setValueAtTime(1400, t0);
      lp.frequency.exponentialRampToValueAtTime(650, t0 + 0.055);
      const g = ctx.createGain();
      g.gain.setValueAtTime(0.001, t0);
      g.gain.exponentialRampToValueAtTime(v * 0.35, t0 + 0.006);
      g.gain.exponentialRampToValueAtTime(0.001, t0 + 0.055);
      src.connect(lp);
      lp.connect(g);
      g.connect(audio.master);
      src.start(t0);
      src.stop(t0 + 0.07);
    }

    function hasAchievement(id) {
      return Array.isArray(profile.unlockedAchievements) && profile.unlockedAchievements.includes(id);
    }

    function isSkinUnlocked(id) {
      return Array.isArray(profile.unlockedSkins) && profile.unlockedSkins.includes(id);
    }

    function unlockSkin(id) {
      const skin = getSkinById(id);
      if (!skin || !skin.id) return false;
      if (!Array.isArray(profile.unlockedSkins)) profile.unlockedSkins = ["default"];
      if (profile.unlockedSkins.includes(skin.id)) return false;
      profile.unlockedSkins.push(skin.id);
      saveProfile();
      return true;
    }

    /**
     * 解锁成就：
     * - toast 提示
     * - 调用 onAchievementUnlocked
     * - 若该成就绑定皮肤解锁，则联动解锁
     */
    function unlockAchievement(id) {
      const a = ACHIEVEMENTS.find((x) => x.id === id);
      if (!a) return false;
      if (!Array.isArray(profile.unlockedAchievements)) profile.unlockedAchievements = [];
      if (profile.unlockedAchievements.includes(id)) return false;

      profile.unlockedAchievements.push(id);

      // 成就 → 皮肤联动解锁
      const unlockedSkinNames = [];
      const skinsToUnlock = Array.isArray(a.unlockSkins) ? a.unlockSkins : [];
      skinsToUnlock.forEach((sid) => {
        if (unlockSkin(sid)) unlockedSkinNames.push(getSkinById(sid).name || sid);
      });

      saveProfile();
      onAchievementUnlocked(id);

      const extra = unlockedSkinNames.length ? `（解锁皮肤：${unlockedSkinNames.join("、")}）` : "";
      toast(`成就达成：${a.name}！${extra}`, 2000);

      // 面板即时刷新
      renderProfilePanel();
      return true;
    }

    function selectSkin(id) {
      if (!isSkinUnlocked(id)) return false;
      if (profile.selectedSkin === id) return true;
      profile.selectedSkin = id;
      saveProfile();
      applySkin(id);
      onSkinChanged(id);
      renderProfilePanel();
      return true;
    }

    function setPanelTab(tab) {

      if (tabBtnSkins) {
        tabBtnSkins.classList.toggle("active", isSkins);

        tabBtnAchievements.classList.toggle("active", !isSkins);
        tabBtnAchievements.setAttribute("aria-selected", !isSkins ? "true" : "false");

      if (panelSkins) panelSkins.style.display = isSkins ? "" : "none";
      if (panelAchievements) panelAchievements.style.display = isSkins ? "none" : "";
    }

    function canOpenProfilePanel() {
      // 只允许在 MENU/OVER 打开；PAUSED/PLAYING 不允许打开（避免破坏节奏）
      return state === STATE.MENU || state === STATE.OVER;

        toast("游戏进行中无法打开面板～", 1200);

    function updatePanelButtonAccess() {

    // 面板事件绑定（Task 8）
    if (panelBtn) panelBtn.addEventListener("click", () => toggleProfilePanel());

    loadHighScore();
    updateDiffButtons();

    const DIR = {
      up: { x: 0, y: -1 },
      down: { x: 0, y: 1 },
      left: { x: -1, y: 0 },
      right: { x: 1, y: 0 },
    };

    const KEY_MAP = {
      ArrowUp: "up", ArrowDown: "down", ArrowLeft: "left", ArrowRight: "right",
      w: "up", s: "down", a: "left", d: "right",
      W: "up", S: "down", A: "left", D: "right",
    };

    function isOpposite(a, b) {
      return a.x === -b.x && a.y === -b.y;
    }

    function isSameDir(a, b) {
      return a.x === b.x && a.y === b.y;
    }

    /**
     * 入队方向（Task 3）
     * - 以“当前将要生效的最后一个方向”为基准：优先取队尾，否则取当前 direction
     * - 反向/重复输入直接丢弃
     * - 队列满时丢弃（保持前面的输入不被覆盖）
     */
    function queueDirection(name, source = "kbd") {
      const d = DIR[name];
      if (!d) return false;
      const base = inputQueue.length ? inputQueue[inputQueue.length - 1] : direction;
      if (isOpposite(base, d)) return false;
      if (isSameDir(base, d)) return false;
      inputQueue.push({ ...d, ts: performance.now(), source });
      // 队列超长时丢弃最早的输入，让“最新的快速连按”更容易被保留
      if (inputQueue.length > MAX_QUEUE) inputQueue.shift();
      return true;
    }

    // 兼容旧调用点：键盘/触控/按钮继续沿用 setDirection，但实际行为为“入队”
    function setDirection(name, source) {
      queueDirection(name, source);
    }

    function randomFood() {
      let pos;
      do {
        pos = {
          x: Math.floor(Math.random() * GRID),
          y: Math.floor(Math.random() * GRID),
        };
      } while (
        snake.some((s) => s.x === pos.x && s.y === pos.y) ||
        (powerup && powerup.x === pos.x && powerup.y === pos.y)
      );
      food = pos;
    }

    function randomEmptyCell() {
      // 简单尝试：棋盘 15x15，最多尝试 300 次足够了
      for (let i = 0; i < 300; i++) {
        const pos = {
          x: Math.floor(Math.random() * GRID),
          y: Math.floor(Math.random() * GRID),
        };
        const occupiedBySnake = snake.some((s) => s.x === pos.x && s.y === pos.y);
        const occupiedByFood = food && food.x === pos.x && food.y === pos.y;
        const occupiedByPowerup = powerup && powerup.x === pos.x && powerup.y === pos.y;
        if (!occupiedBySnake && !occupiedByFood && !occupiedByPowerup) return pos;
      }
      return null;
    }

    function updatePowerup(now) {
      // 道具到期事件：只触发一次（因为随后 powerup 会被置空）
      if (powerup && now >= powerup.expiresAt) {
        const type = powerup.type;
        powerup = null;
        onPowerupExpired(type);
      }
    }

    function maybeSpawnPowerup(now) {
      if (powerup) return false; // 场上最多 1 个
      if (Math.random() >= POWERUP_SPAWN_CHANCE) return false;
      const pos = randomEmptyCell();
      if (!pos) return false;
      const type = POWERUP_TYPES[Math.floor(Math.random() * POWERUP_TYPES.length)];
      powerup = { x: pos.x, y: pos.y, type, spawnedAt: now, expiresAt: now + POWERUP_LIFETIME_MS };
      return true;
    }

    function ensureProfileStatsField(name) {
      if (!profile.stats) profile.stats = {};
      if (typeof profile.stats[name] !== "number") profile.stats[name] = 0;
    }

    function applyPowerup(type, now) {
      ensureProfileStatsField("totalPowerups");
      profile.stats.totalPowerups += 1;

      if (type === "speed") {
        effects.speedUntil = Math.max(effects.speedUntil || 0, now + 5000);
      } else if (type === "double") {
        effects.doubleUntil = Math.max(effects.doubleUntil || 0, now + 8000);
      } else if (type === "shield") {
        effects.shield = true;
      }
      saveProfile();
    }

    function scoreMultiplier(now) {
      return now < (effects.doubleUntil || 0) ? 2 : 1;
    }

    function effectiveMoveInterval(now) {
      let interval = moveInterval;
      if (now < (effects.speedUntil || 0)) interval *= 0.75;
      return interval;
    }

    function resetGame() {
      const cfg = getDiffConfig();
      const mid = Math.floor(GRID / 2);
      snake = [
        { x: mid - 2, y: mid },
        { x: mid - 1, y: mid },
        { x: mid, y: mid },
      ];
      direction = { x: 1, y: 0 };
      inputQueue = [];
      score = 0;
      moveInterval = cfg.initialSpeed;
      powerup = null;
      effects = { speedUntil: 0, doubleUntil: 0, shield: false };
      scoreEl.textContent = "0";
      particles = [];
      // Task 8：本局统计重置
      foodEatenThisGame = 0;
      powerupsPickedThisGame = 0;
      shieldSavesThisGame = 0;
      doubleFoodEatenThisGame = 0;
      randomFood();
    }

      overlay.classList.add("visible");

    function startGame() {
      ensureAudio();

      state = STATE.PLAYING;
      hideOverlay();
      updateDiffButtons();
      updatePanelButtonAccess();
      sfxStart();
      lastTick = performance.now();
      cancelAnimationFrame(animId);
      animId = requestAnimationFrame(loop);
    }

    // 创建爆炸粒子
    function createExplosionParticles() {
      particles = [];
      snake.forEach((seg, i) => {
        const cx = seg.x * CELL + CELL / 2;
        const cy = seg.y * CELL + CELL / 2;
        const isHead = i === snake.length - 1;
        
        // 每个蛇身节点产生多个粒子
        const particleCount = isHead ? 20 : 12;
        for (let j = 0; j < particleCount; j++) {
          const angle = (Math.PI * 2 * j) / particleCount + Math.random() * 0.5;
          const speed = 2 + Math.random() * 4;
          const size = (isHead ? 8 : 5) + Math.random() * 4;
          
          // 渐变色：从绿色到黄色到红色
          const progress = i / snake.length;
          let r, g, b;
          if (progress < 0.5) {
            r = Math.floor(93 + (255 - 93) * progress * 2);
            g = Math.floor(211 + (200 - 211) * progress * 2);
            b = Math.floor(158 - 100 * progress * 2);
          } else {
            r = Math.floor(255 - 55 * (progress - 0.5) * 2);
            g = Math.floor(200 - 100 * (progress - 0.5) * 2);
            b = Math.floor(58 + 40 * (progress - 0.5) * 2);
          }
          
          particles.push({
            x: cx,
            y: cy,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 2, // 初始向上偏移
            size: size,
            color: `rgb(${r}, ${g}, ${b})`,
            alpha: 1,
            gravity: 0.15 + Math.random() * 0.1,
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 0.3,
            type: isHead && j < 5 ? 'star' : 'circle'
          });
        }
      });
    }

    // 更新和绘制爆炸粒子
    function updateAndDrawParticles(deltaTime) {
      particles.forEach(p => {
        // 更新位置
        p.x += p.vx;
        p.y += p.vy;
        p.vy += p.gravity; // 重力
        p.vx *= 0.98; // 空气阻力
        p.alpha -= deltaTime / EXPLOSION_DURATION;
        p.rotation += p.rotationSpeed;
      });
      
      // 移除消失的粒子
      particles = particles.filter(p => p.alpha > 0);
      
      // 绘制粒子
      particles.forEach(p => {
        ctx.save();
        ctx.globalAlpha = p.alpha;
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rotation);
        
        if (p.type === 'star') {
          // 绘制星星形状
          ctx.fillStyle = p.color;
          ctx.beginPath();
          for (let i = 0; i < 5; i++) {
            const angle = (i * Math.PI * 2) / 5 - Math.PI / 2;
            const innerAngle = angle + Math.PI / 5;
            const outerR = p.size;
            const innerR = p.size * 0.4;
            if (i === 0) {
              ctx.moveTo(Math.cos(angle) * outerR, Math.sin(angle) * outerR);
            } else {
              ctx.lineTo(Math.cos(angle) * outerR, Math.sin(angle) * outerR);
            }
            ctx.lineTo(Math.cos(innerAngle) * innerR, Math.sin(innerAngle) * innerR);
          }
          ctx.closePath();
          ctx.fill();
        } else {
          // 绘制圆形粒子
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(0, 0, p.size * p.alpha, 0, Math.PI * 2);
          ctx.fill();
          
          // 添加发光效果
          const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, p.size * p.alpha * 2);
          gradient.addColorStop(0, p.color);
          gradient.addColorStop(1, 'transparent');
          ctx.fillStyle = gradient;
          ctx.globalAlpha = p.alpha * 0.3;
          ctx.beginPath();
          ctx.arc(0, 0, p.size * p.alpha * 2, 0, Math.PI * 2);
          ctx.fill();
        }
        
        ctx.restore();
      });
    }

    function gameOver() {
      state = STATE.EXPLODING;
      explosionTimer = 0;
      sfxDie();
      createExplosionParticles();
    }

    function showGameOverUI() {
      // Task 8：结算前先把状态切到 OVER（让按钮/面板的可用性更自然）
      state = STATE.OVER;
      updateDiffButtons();
      const diffLabel = getDiffConfig().label;

      // Task 8：结算写入长期统计（不影响核心规则）
      ensureProfileStatsField("gamesPlayed");
      ensureProfileStatsField("totalScore");
      ensureProfileStatsField("totalFood");
      ensureProfileStatsField("maxScoreEver");
      ensureProfileStatsField("maxFoodOneGame");
      profile.stats.gamesPlayed += 1;
      profile.stats.totalScore += score;
      profile.stats.totalFood += foodEatenThisGame;
      profile.stats.maxScoreEver = Math.max(profile.stats.maxScoreEver, score);
      profile.stats.maxFoodOneGame = Math.max(profile.stats.maxFoodOneGame, foodEatenThisGame);
      saveProfile();

      // Task 8：游戏结束时检查一次成就
      checkAchievements("game_over");

      if (score > highScore) {
        highScore = score;
        localStorage.setItem(highScoreKey(), String(highScore));
        highScoreEl.textContent = highScore;
        sfxRecord();
        showOverlay("哇！新纪录！🎉", `【${diffLabel}】本局 ${score} 分，太厉害啦！`, "再来一局");
      } else {
        showOverlay("哎呀撞到了！💥", `【${diffLabel}】本局 ${score} 分，再试一次吧～`, "再来一局");
      }

    function togglePause() {
      if (state === STATE.PLAYING) {
        state = STATE.PAUSED;
        sfxPause();
        showOverlay("休息一下 ⏸", "按空格或点按钮继续", "继续游戏");
      } else if (state === STATE.PAUSED) {
        state = STATE.PLAYING;
        hideOverlay();
        sfxPause();
        lastTick = performance.now();
      }
      updatePanelButtonAccess();
    }

    // =========================
    // Task 8：成就判断
    // - 在“吃食物/拾取道具/护盾救命/游戏结束”时调用
    // - 只做条件判定与解锁，不影响移动/碰撞/计分逻辑
    // =========================
    function checkAchievements(reason = "unknown") {
      // 注意：部分成就依赖“累计统计”，这里用“当前档案 + 本局增量”的投影值判断
      // - 大多数时机（吃食物/拾取道具/护盾救命）下，累计统计尚未写入本局增量
      // - 但在 game_over 里我们会先写入统计再检查一次，因此这里避免重复叠加
      const baseTotalFood = Number(profile?.stats?.totalFood) || 0;
      const baseGamesPlayed = Number(profile?.stats?.gamesPlayed) || 0;
      const projectedTotalFood = reason === "game_over" ? baseTotalFood : (baseTotalFood + foodEatenThisGame);
      const projectedGamesPlayed = baseGamesPlayed;

      // 1) 本局吃到 1 个食物
      if (foodEatenThisGame >= 1) unlockAchievement("a_first_bite");
      // 2) 本局吃到 10 个食物
      if (foodEatenThisGame >= 10) unlockAchievement("a_feast_10");
      // 3) 本局得分 >= 100
      if (score >= 100) unlockAchievement("a_score_100");
      // 4) 本局拾取 3 个道具
      if (powerupsPickedThisGame >= 3) unlockAchievement("a_powerup_3");
      // 5) 护盾救命 1 次
      if (shieldSavesThisGame >= 1) unlockAchievement("a_shield_save");
      // 6) 双倍分期间吃到 3 个食物
      if (doubleFoodEatenThisGame >= 3) unlockAchievement("a_double_3");
      // 7) 累计完成 10 局
      if (projectedGamesPlayed >= 10) unlockAchievement("a_veteran_10");
      // 8) 累计吃到 50 个食物
      if (projectedTotalFood >= 50) unlockAchievement("a_total_food_50");

      // reason 目前仅用于可读性与后续扩展（不做分支优化，保持简单稳定）
      void reason;
    }

    function tick(now = performance.now()) {
      updatePowerup(now);

      // 每个 tick 只消费 1 个方向输入
      if (inputQueue.length) {
        const d = inputQueue.shift();
        // 防御性检查：即使入队时已拦截，这里也避免在极端情况下出现“瞬间反向”
        if (d && !isOpposite(direction, d)) direction = { x: d.x, y: d.y };
      }
      const head = snake[snake.length - 1];
      const newHead = { x: head.x + direction.x, y: head.y + direction.y };

      const hitWall = newHead.x < 0 || newHead.x >= GRID || newHead.y < 0 || newHead.y >= GRID;
      const hitSelf = snake.some((s) => s.x === newHead.x && s.y === newHead.y);
      if (hitWall || hitSelf) {
        if (effects.shield) {
          effects.shield = false;
          ensureProfileStatsField("shieldSaves");
          profile.stats.shieldSaves += 1;
          saveProfile();
          onShieldSave();
          // Task 8：本局统计 + 成就检查（护盾救命）
          shieldSavesThisGame += 1;
          checkAchievements("shield_save");
          // 护盾救命：取消本次移动（不 push newHead、不推进蛇）
          return;
        }
        gameOver();
        return;
      }

      snake.push(newHead);

      // 拾取道具（先于吃食物判断，避免同格冲突造成逻辑分叉）
      if (powerup && newHead.x === powerup.x && newHead.y === powerup.y) {
        const type = powerup.type;
        powerup = null;
        applyPowerup(type, now);
        onPowerupPickup(type);
        // Task 8：本局统计 + 成就检查（拾取道具）
        powerupsPickedThisGame += 1;
        checkAchievements("pickup_powerup");
      }

      if (newHead.x === food.x && newHead.y === food.y) {
        const cfg = getDiffConfig();
        const mult = scoreMultiplier(now);
        const gained = FOOD_SCORE * mult;
        // Task 6-2：吃到食物时飘字（+10/+20）
        addFloatingText(
          `+${gained}`,
          food.x * CELL + CELL / 2,
          food.y * CELL + CELL / 2,
          { color: mult >= 2 ? "#f59e0b" : cssVar("--accent", "#ff6b9d") }
        );

        score += gained;
        scoreEl.textContent = score;
        moveInterval = Math.max(cfg.minSpeed, moveInterval - cfg.speedStep);
        sfxEat();
        if (mult >= 2) onDoubleEatFood();
        // Task 8：本局统计 + 成就检查（吃食物）
        foodEatenThisGame += 1;
        if (mult >= 2) doubleFoodEatenThisGame += 1;
        checkAchievements("eat_food");
        randomFood();
        maybeSpawnPowerup(now);
      } else {
        snake.shift();
      }
    }

    // =========================
    // 音频 HUD 交互（Task 7-4）
    // - 修改即保存到 localStorage，并立刻生效（通过 ensureAudio 更新 masterGain）
    // =========================
    function updateSoundUI() {
      if (!muteBtn || !volumeSlider) return;
      muteBtn.textContent = audioSettings?.muted ? "🔇" : "🔊";
      muteBtn.setAttribute("aria-label", audioSettings?.muted ? "已静音，点击取消静音" : "已开启声音，点击静音");
      volumeSlider.value = String(Math.max(0, Math.min(1, Number(audioSettings?.volume ?? 0.8))));
    }

    updateSoundUI();

    if (muteBtn) {
      muteBtn.addEventListener("click", () => {
        // 点击按钮属于用户手势：允许解锁 WebAudio
        ensureAudio();
        audioSettings.muted = !audioSettings.muted;
        saveAudioSettings();
        ensureAudio();
        updateSoundUI();
      });
    }

    if (volumeSlider) {
      volumeSlider.addEventListener("input", () => {
        const v = Math.max(0, Math.min(1, Number(volumeSlider.value)));
        audioSettings.volume = v;
        saveAudioSettings();
        ensureAudio();
        updateSoundUI();
      });
    }

    /**
     * 断言工具：用于自测
     * @param {boolean} ok 条件是否成立
     * @param {string} name 用例名称
     * @param {any} [extra] 附加信息（便于 console.table 查看）
     */
    function assert(ok, name, extra) {
      return { name, ok: !!ok, extra };
    }

    /**
     * 自测入口：仅在 location.hash === "#test" 时运行
     * - 不启动游戏循环（不调用 startGame / requestAnimationFrame）
     * - 通过 overlay 提示通过/失败，并 console.table 输出明细
     */
    function runSelfTests() {
      const results = [];
      const add = (r) => results.push(r);

      // 为了在 overlay 里显示多行文本
      overlayMsg.style.whiteSpace = "pre-line";

      // 避免测试时误点开始（也避免音频解锁等副作用）
      actionBtn.style.display = "none";
      diffBtns.forEach((b) => (b.disabled = true));

      // 避免自测污染真实存档（自测会触发护盾/道具统计写入）
      const _profile = profile;
      const _saveProfile = saveProfile;

      try {
        profile = defaultProfile();
        saveProfile = () => {};

        // 用例 0：Storage/profile/audioSettings 基础 shape
        const p = defaultProfile();
        add(assert(p?.version === 1, "profile: default version=1", p?.version));
        add(assert(!!p?.stats, "profile: has stats object", p?.stats));
        add(assert(Array.isArray(p?.unlockedSkins) && p.unlockedSkins.includes("default"), "profile: default skin unlocked", p?.unlockedSkins));

        const a0 = defaultAudioSettings();
        add(assert(typeof a0?.muted === "boolean", "audioSettings: muted is boolean", a0));
        add(assert(typeof a0?.volume === "number" && a0.volume >= 0 && a0.volume <= 1, "audioSettings: volume in [0,1]", a0));

        const a1 = normalizeAudioSettings({ muted: false, volume: 3 });
        add(assert(a1.volume === 1, "audioSettings: volume clamp (3 -> 1)", a1));

        // 额外：loadJSON/saveJSON 最小回环测试（仅 test 模式写入临时 key）
        const tmpKey = "__snake_test_tmp_json__";
        saveJSON(tmpKey, { ok: true, n: 1 });
        const tmp = loadJSON(tmpKey, null);
        add(assert(tmp?.ok === true && tmp?.n === 1, "loadJSON/saveJSON: roundtrip", tmp));
        try { localStorage.removeItem(tmpKey); } catch {}

        // 用例 1：isOpposite()
        add(assert(isOpposite({ x: 1, y: 0 }, { x: -1, y: 0 }) === true, "isOpposite: 右 vs 左"));
        add(assert(isOpposite({ x: 0, y: 1 }, { x: 0, y: -1 }) === true, "isOpposite: 下 vs 上"));
        add(assert(isOpposite({ x: 1, y: 0 }, { x: 0, y: 1 }) === false, "isOpposite: 右 vs 下"));

        // 用例 2：输入队列：拒绝反向（不入队）
        state = STATE.PLAYING;
        direction = { x: 1, y: 0 };
        inputQueue = [];
        queueDirection("left"); // 反向，应该被丢弃
        add(assert(inputQueue.length === 0, "inputQueue: 反向输入应被拒绝（不入队）", inputQueue.slice()));

        // 用例 3：输入队列：顺序保留（tick 每次消费 1 个）
        direction = { x: 1, y: 0 };
        inputQueue = [];
        queueDirection("up");
        queueDirection("left");
        queueDirection("down");
        add(assert(inputQueue.length === 3, "inputQueue: 入队后长度=3", inputQueue.map((d) => `${d.x},${d.y}`)));
        queueDirection("right"); // 第 4 次入队：应丢弃最早的 up，保留后 3 个
        add(assert(
          inputQueue.length === 3 && inputQueue[0].x === -1 && inputQueue[0].y === 0,
          "inputQueue: 超长时丢弃最早输入",
          inputQueue.map((d) => `${d.x},${d.y}`)
        ));
        // 用单节蛇避免“第一步就撞到自己”影响用例稳定性
        snake = [{ x: 10, y: 10 }];
        food = { x: 0, y: 0 };
        tick(1000); // left
        add(assert(direction.x === -1 && direction.y === 0, "tick: 第 1 次消费方向=左", direction));
        tick(1001); // down
        add(assert(direction.x === 0 && direction.y === 1, "tick: 第 2 次消费方向=下", direction));
        tick(1002); // right
        add(assert(direction.x === 1 && direction.y === 0, "tick: 第 3 次消费方向=右", direction));

        // 用例 4：resetGame() 基础状态
        difficulty = "medium";
        resetGame();
        const mid = Math.floor(GRID / 2);
        add(assert(snake.length === 3, "resetGame: 蛇初始长度=3", snake.map((s) => `${s.x},${s.y}`)));
        add(assert(snake[2].x === mid && snake[2].y === mid, "resetGame: 蛇头在棋盘中央附近", snake[2]));
        add(assert(score === 0, "resetGame: 分数归零", score));

        // 用例 5：randomFood() 不应落在蛇身上（用可控随机保证可重复）
        snake = [{ x: 0, y: 0 }, { x: 1, y: 0 }, { x: 2, y: 0 }];
        const _rand = Math.random;
        const seq = [0, 0, 0.95, 0.95]; // 先命中(0,0)（冲突）再命中(19,19)（不冲突）
        let idx = 0;
        Math.random = () => (idx < seq.length ? seq[idx++] : 0.5);
        randomFood();
        Math.random = _rand;
        add(assert(!snake.some((s) => s.x === food.x && s.y === food.y), "randomFood: 食物不应生成在蛇身上", food));

        // 用例 6：tick() 吃到食物后加分、变长、加速
        state = STATE.PLAYING;
        difficulty = "medium";
        const cfg = getDiffConfig();
        snake = [{ x: 0, y: 0 }, { x: 1, y: 0 }, { x: 2, y: 0 }];
        direction = { x: 1, y: 0 };
        inputQueue = [];
        food = { x: 3, y: 0 };
        score = 0;
        moveInterval = cfg.initialSpeed;
        tick(2000);
        add(assert(score === FOOD_SCORE, "tick: 吃到食物后得分+10", score));
        add(assert(snake.length === 4, "tick: 吃到食物后蛇长度+1", snake.length));
        add(assert(moveInterval < cfg.initialSpeed && moveInterval >= cfg.minSpeed, "tick: 吃到食物后速度提升（间隔变小）", moveInterval));

        // 用例 7：tick() 普通移动：长度不变
        snake = [{ x: 5, y: 5 }, { x: 6, y: 5 }, { x: 7, y: 5 }];
        direction = { x: 1, y: 0 };
        inputQueue = [];
        food = { x: 0, y: 0 };
        const lenBefore = snake.length;
        tick(3000);
        add(assert(snake.length === lenBefore, "tick: 未吃到食物时长度不变", { before: lenBefore, after: snake.length }));
        add(assert(snake[snake.length - 1].x === 8 && snake[snake.length - 1].y === 5, "tick: 蛇头按方向前进", snake[snake.length - 1]));

        // 用例 8：tick() 撞墙应进入 EXPLODING 状态
        snake = [{ x: GRID - 3, y: 0 }, { x: GRID - 2, y: 0 }, { x: GRID - 1, y: 0 }];
        direction = { x: 1, y: 0 };
        inputQueue = [];
        state = STATE.PLAYING;
        tick(4000);
        add(assert(state === STATE.EXPLODING, "tick: 撞墙触发 gameOver（EXPLODING）", state));

        // 用例 9：tick() 撞到自己应进入 EXPLODING 状态
        snake = [{ x: 0, y: 0 }, { x: 1, y: 0 }, { x: 1, y: 1 }, { x: 0, y: 1 }];
        direction = { x: 1, y: 0 };
        inputQueue = []; // 头(0,1) 向右进入(1,1)，与身体碰撞
        state = STATE.PLAYING;
        tick(5000);
        add(assert(state === STATE.EXPLODING, "tick: 撞到自己触发 gameOver（EXPLODING）", state));

        // 用例 10：effects timer：speedUntil 影响 effectiveMoveInterval(now)
        moveInterval = 200;
        effects = { speedUntil: 6000, doubleUntil: 0, shield: false };
        add(assert(
          Math.abs(effectiveMoveInterval(1000) - 150) < 0.0001,
          "effects: speed active -> effectiveMoveInterval=moveInterval*0.75",
          effectiveMoveInterval(1000)
        ));
        add(assert(
          Math.abs(effectiveMoveInterval(7000) - 200) < 0.0001,
          "effects: speed expired -> effectiveMoveInterval back to base",
          effectiveMoveInterval(7000)
        ));

        // 用例 11：护盾救命：碰撞时消耗护盾并取消本次移动
        state = STATE.PLAYING;
        snake = [{ x: 0, y: 0 }];
        direction = { x: -1, y: 0 }; // 下一步撞墙
        inputQueue = [];
        effects = { speedUntil: 0, doubleUntil: 0, shield: true };
        profile.stats.shieldSaves = 0;
        tick(8000);
        add(assert(state === STATE.PLAYING, "shield: 撞墙但有护盾 -> 不 gameOver", state));
        add(assert(snake.length === 1 && snake[0].x === 0 && snake[0].y === 0, "shield: 取消本次移动 -> 蛇位置不变", snake.slice()));
        add(assert(effects.shield === false, "shield: 护盾应被消耗（shield=false）", effects));
        add(assert(profile.stats.shieldSaves === 1, "shield: profile.stats.shieldSaves +1", profile.stats.shieldSaves));
      } catch (err) {
        add(assert(false, "自测运行异常（请看控制台）", String(err?.stack || err)));
      } finally {
        // 还原被自测临时替换的存档写入
        profile = _profile;
        saveProfile = _saveProfile;
      }

      // 输出结果（控制台也给出 table 便于查看）
      const failed = results.filter((r) => !r.ok);
      console.table(results.map((r) => ({ 用例: r.name, 通过: r.ok, 详情: r.extra })));

      if (failed.length === 0) {
        showOverlay("自测通过 ✅", `共 ${results.length} 项：全部通过。\n提示：删除 #test 可正常开始游戏。`, " ");
      } else {
        const top = failed.slice(0, 6).map((r) => `- ${r.name}`).join("\n");
        showOverlay("自测失败 ❌", `共 ${results.length} 项：失败 ${failed.length} 项。\n${top}\n（更多细节见控制台 console.table）`, " ");
      }

      // 自测不需要持续渲染，但保留一次 draw() 让画面不为空
      state = STATE.MENU;
      draw();
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    // 绘制改进的蛇
    function drawSnake() {
      const pad = Math.max(1, CELL * 0.1);
      const corner = Math.max(1, CELL * 0.25);

      // 绘制蛇身连接（先绘制连接部分）
      // Task 8：蛇身颜色随皮肤变化（连接线）
      ctx.strokeStyle = palette.snakeLink;
      ctx.lineWidth = CELL * 0.6;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      
      if (snake.length > 1) {
        ctx.beginPath();
        for (let i = 0; i < snake.length; i++) {
          const seg = snake[i];
          const cx = seg.x * CELL + CELL / 2;
          const cy = seg.y * CELL + CELL / 2;
          if (i === 0) {
            ctx.moveTo(cx, cy);
          } else {
            ctx.lineTo(cx, cy);
          }
        }
        ctx.stroke();
      }

      // 绘制每个蛇身节点
      snake.forEach((seg, i) => {
        const isHead = i === snake.length - 1;
        const isTail = i === 0;
        const progress = i / Math.max(1, snake.length - 1);
        
        const x = seg.x * CELL + pad;
        const y = seg.y * CELL + pad;
        const w = CELL - pad * 2;

        // 渐变色蛇身
        const gradient = ctx.createLinearGradient(x, y, x + w, y + w);
        if (isHead) {
          gradient.addColorStop(0, palette.snakeHead);
          gradient.addColorStop(0.5, `hsl(${(palette.hueBase + 22) % 360}, 78%, 52%)`);
          gradient.addColorStop(1, palette.snakeHead);
        } else {
          // Task 8：用 hueBase 推导“蛇身渐变”
          const hue = (palette.hueBase + progress * 26) % 360;
          gradient.addColorStop(0, `hsl(${hue}, 72%, 54%)`);
          gradient.addColorStop(0.5, `hsl(${hue}, 78%, 60%)`);
          gradient.addColorStop(1, `hsl(${hue}, 72%, 54%)`);
        }

        ctx.fillStyle = gradient;
        
        // 蛇身使用圆形，头部稍大
        const size = isHead ? w * 1.1 : w;
        const offset = isHead ? (w - size) / 2 : 0;
        
        ctx.beginPath();
        ctx.arc(x + w/2, y + w/2, size/2, 0, Math.PI * 2);
        ctx.fill();

        // 添加高光效果
        ctx.fillStyle = "rgba(255, 255, 255, 0.3)";
        ctx.beginPath();
        ctx.arc(x + w/2 - size*0.15, y + w/2 - size*0.15, size*0.25, 0, Math.PI * 2);
        ctx.fill();

        // 蛇身花纹（斑点）
        if (!isHead && !isTail && CELL >= 16) {
          ctx.fillStyle = "rgba(255, 255, 255, 0.2)";
          const spotSize = CELL * 0.12;
          const spots = [
            { dx: 0.3, dy: 0.3 },
            { dx: 0.7, dy: 0.6 },
          ];
          spots.forEach(spot => {
            ctx.beginPath();
            ctx.arc(x + w * spot.dx, y + w * spot.dy, spotSize, 0, Math.PI * 2);
            ctx.fill();
          });
        }

        // 绘制蛇头特征
        if (isHead && CELL >= 16) {
          const centerX = x + w / 2;
          const centerY = y + w / 2;
          
          // 眼睛
          const eyeR = CELL * 0.14;
          const pupilR = CELL * 0.07;
          const eyeOffset = CELL * 0.18;
          const nudge = CELL * 0.06;
          
          let eye1X = centerX - eyeOffset;
          let eye2X = centerX + eyeOffset;
          let eyeY = centerY - eyeOffset * 0.5;
          
          // 根据方向调整眼睛位置
          eye1X += direction.x * nudge;
          eye2X += direction.x * nudge;
          eyeY += direction.y * nudge;

          // 眼白
          ctx.fillStyle = "#fff";
          ctx.beginPath();
          ctx.arc(eye1X, eyeY, eyeR, 0, Math.PI * 2);
          ctx.arc(eye2X, eyeY, eyeR, 0, Math.PI * 2);
          ctx.fill();
          
          // 眼珠
          ctx.fillStyle = "#1a1a2e";
          ctx.beginPath();
          ctx.arc(eye1X + direction.x * nudge * 0.5, eyeY + direction.y * nudge * 0.5, pupilR, 0, Math.PI * 2);
          ctx.arc(eye2X + direction.x * nudge * 0.5, eyeY + direction.y * nudge * 0.5, pupilR, 0, Math.PI * 2);
          ctx.fill();
          
          // 眼睛高光
          ctx.fillStyle = "#fff";
          ctx.beginPath();
          ctx.arc(eye1X - pupilR * 0.3, eyeY - pupilR * 0.3, pupilR * 0.4, 0, Math.PI * 2);
          ctx.arc(eye2X - pupilR * 0.3, eyeY - pupilR * 0.3, pupilR * 0.4, 0, Math.PI * 2);
          ctx.fill();

          // 腮红
          ctx.fillStyle = "rgba(255, 150, 180, 0.4)";
          ctx.beginPath();
          ctx.ellipse(centerX - size * 0.35, centerY + size * 0.15, CELL * 0.08, CELL * 0.05, 0, 0, Math.PI * 2);
          ctx.ellipse(centerX + size * 0.35, centerY + size * 0.15, CELL * 0.08, CELL * 0.05, 0, 0, Math.PI * 2);
          ctx.fill();

          // 舌头动画
          tongueTimer += 0.15;
          if (Math.sin(tongueTimer) > 0.7) {
            tongueOut = true;
          } else {
            tongueOut = false;
          }
          
          if (tongueOut) {
            const tongueLength = CELL * 0.4;
            const tongueWidth = CELL * 0.06;
            const tongueX = centerX + direction.x * size * 0.5;
            const tongueY = centerY + direction.y * size * 0.5;
            const endX = tongueX + direction.x * tongueLength;
            const endY = tongueY + direction.y * tongueLength;
            
            // 舌头主体
            // Task 8：舌头/点缀色随皮肤变化
            ctx.strokeStyle = palette.accent;
            ctx.lineWidth = tongueWidth;
            ctx.lineCap = "round";
            ctx.beginPath();
            ctx.moveTo(tongueX, tongueY);
            ctx.lineTo(endX, endY);
            ctx.stroke();
            
            // 舌头分叉
            const forkLength = CELL * 0.15;
            const forkAngle = 0.5;
            ctx.lineWidth = tongueWidth * 0.7;
            
            ctx.beginPath();
            ctx.moveTo(endX, endY);
            ctx.lineTo(
              endX + direction.x * forkLength + direction.y * forkLength * Math.sin(forkAngle),
              endY + direction.y * forkLength - direction.x * forkLength * Math.sin(forkAngle)
            );
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(endX, endY);
            ctx.lineTo(
              endX + direction.x * forkLength - direction.y * forkLength * Math.sin(forkAngle),
              endY + direction.y * forkLength + direction.x * forkLength * Math.sin(forkAngle)
            );
            ctx.stroke();
          }
        }
      });
    }

    function draw(now = performance.now(), dt = 16) {
      ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

      // Task 6-1：离屏缓存的网格背景
      if (gridCacheCanvas) ctx.drawImage(gridCacheCanvas, 0, 0);

      // 绘制食物
      foodPulse += 0.08;
      const pulse = 1 + Math.sin(foodPulse) * 0.08;
      const fx = food.x * CELL + CELL / 2;
      const fy = food.y * CELL + CELL / 2;
      const fr = Math.max(1, CELL / 2 - 0.5) * pulse;

      // 食物发光效果
      const foodGlow = ctx.createRadialGradient(fx, fy, 0, fx, fy, fr * 1.5);
      // Task 8：食物颜色随皮肤变化
      foodGlow.addColorStop(0, rgbaFromHsl((palette.hueBase + 55) % 360, 0.86, 0.55, 0.28));
      foodGlow.addColorStop(1, "transparent");
      ctx.fillStyle = foodGlow;
      ctx.beginPath();
      ctx.arc(fx, fy, fr * 1.5, 0, Math.PI * 2);
      ctx.fill();

      // 食物主体
      ctx.fillStyle = palette.food;
      ctx.beginPath();
      ctx.arc(fx, fy, fr, 0, Math.PI * 2);
      ctx.fill();
      
      // 食物高光
      ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
      ctx.beginPath();
      ctx.arc(fx - fr * 0.3, fy - fr * 0.3, fr * 0.35, 0, Math.PI * 2);
      ctx.fill();
      
      // 叶子
      if (CELL >= 8) {
        ctx.fillStyle = palette.snake;
        ctx.beginPath();
        ctx.ellipse(fx + fr * 0.3, fy - fr * 0.9, fr * 0.35, fr * 0.25, -0.4, 0, Math.PI * 2);
        ctx.fill();
      }

      // 绘制道具（无需 UI/toast，仅在棋盘上可见）
      if (powerup) {
        updatePowerup(now);
        if (powerup) {
          const remain = powerup.expiresAt - now;
          let visible = true;
          if (remain <= POWERUP_BLINK_WARNING_MS) {
            // 最后 1.2s 闪烁：约每 150ms 切换一次
            visible = (Math.floor(remain / 150) % 2) === 0;
          }
          if (visible) {
            const px = powerup.x * CELL + CELL / 2;
            const py = powerup.y * CELL + CELL / 2;
            const pr = Math.max(2, CELL * 0.32);

            const colorMap = {
              speed: "#60a5fa",
              double: "#f59e0b",
              shield: "#a78bfa",
            };
            const base = colorMap[powerup.type] || "#94a3b8";

            // 发光底
            const g = ctx.createRadialGradient(px, py, 0, px, py, pr * 1.6);
            g.addColorStop(0, `${base}55`);
            g.addColorStop(1, "transparent");
            ctx.fillStyle = g;
            ctx.beginPath();
            ctx.arc(px, py, pr * 1.6, 0, Math.PI * 2);
            ctx.fill();

            // 主体
            ctx.fillStyle = base;
            ctx.beginPath();
            ctx.arc(px, py, pr, 0, Math.PI * 2);
            ctx.fill();

            // 小图标（纯图形，无 toast）
            ctx.fillStyle = "rgba(255,255,255,0.9)";
            ctx.strokeStyle = "rgba(255,255,255,0.9)";
            ctx.lineWidth = Math.max(2, CELL * 0.08);

            if (powerup.type === "speed") {
              // 简化闪电
              ctx.beginPath();
              ctx.moveTo(px - pr * 0.15, py - pr * 0.55);
              ctx.lineTo(px + pr * 0.05, py - pr * 0.05);
              ctx.lineTo(px - pr * 0.05, py - pr * 0.05);
              ctx.lineTo(px + pr * 0.15, py + pr * 0.55);
              ctx.lineTo(px - pr * 0.05, py + pr * 0.1);
              ctx.lineTo(px + pr * 0.05, py + pr * 0.1);
              ctx.closePath();
              ctx.fill();
            } else if (powerup.type === "double") {
              // 两个重叠小圆
              ctx.beginPath();
              ctx.arc(px - pr * 0.18, py, pr * 0.32, 0, Math.PI * 2);
              ctx.fill();
              ctx.beginPath();
              ctx.arc(px + pr * 0.18, py, pr * 0.32, 0, Math.PI * 2);
              ctx.fill();
            } else if (powerup.type === "shield") {
              // 简化盾牌：半圆+尖底
              ctx.beginPath();
              ctx.moveTo(px, py + pr * 0.6);
              ctx.quadraticCurveTo(px + pr * 0.55, py + pr * 0.2, px + pr * 0.5, py - pr * 0.2);
              ctx.quadraticCurveTo(px, py - pr * 0.75, px - pr * 0.5, py - pr * 0.2);
              ctx.quadraticCurveTo(px - pr * 0.55, py + pr * 0.2, px, py + pr * 0.6);
              ctx.closePath();
              ctx.fill();
            }
          }
        }
      }

      // 绘制蛇（非爆炸状态）
      if (state !== STATE.EXPLODING) {
        drawSnake();
      }
      
      // 绘制爆炸粒子
      if (state === STATE.EXPLODING) {
        updateAndDrawParticles(dt);
      }

      // Task 6-2：飘字（放最后，保证在最上层）
      updateAndDrawFloatingTexts(dt);
    }

    let lastFrameTime = 0;
    function loop(now) {
      animId = requestAnimationFrame(loop);
      const deltaTime = now - lastFrameTime;
      lastFrameTime = now;

      // 处理爆炸动画
      if (state === STATE.EXPLODING) {
        explosionTimer += deltaTime;
        draw(now, deltaTime);
        if (explosionTimer >= EXPLOSION_DURATION) {
          showGameOverUI();
        }
        return;
      }

      updatePowerup(now);
      draw(now, deltaTime);

      if (state !== STATE.PLAYING) return;

      if (now - lastTick >= effectiveMoveInterval(now)) {
        lastTick = now;
        tick(now);
      }
    }

    document.addEventListener("keydown", (e) => {
      if (e.key === " " || e.code === "Space") {
        e.preventDefault();
        if (state === STATE.PLAYING || state === STATE.PAUSED) togglePause();
        return;
      }

      const dir = KEY_MAP[e.key];
      if (dir) {
        e.preventDefault();
        if (state === STATE.PLAYING || state === STATE.PAUSED) setDirection(dir);
      }
    });

    actionBtn.addEventListener("click", () => {
      if (IS_TEST_MODE) return; // 自测模式不允许启动游戏循环/音频初始化
      ensureAudio();
      if (state === STATE.MENU || state === STATE.OVER) startGame();
      else if (state === STATE.PAUSED) togglePause();
    });

    diffBtns.forEach((btn) => {
      btn.addEventListener("click", () => {
        ensureAudio();
        setDifficulty(btn.dataset.diff);
      });
    });

    document.querySelectorAll(".dpad-btn[data-dir]").forEach((btn) => {
      const handler = (e) => {
        e.preventDefault();
        if (state === STATE.PLAYING || state === STATE.PAUSED) setDirection(btn.dataset.dir);
      };
      btn.addEventListener("pointerdown", handler);
    });

    let touchStart = null;
    canvas.addEventListener("pointerdown", (e) => {
      touchStart = { x: e.clientX, y: e.clientY };
    });
    function swipeThreshold() {
      const w = canvas.getBoundingClientRect().width || CANVAS_SIZE;
      return Math.max(24, Math.min(40, Math.floor(w * 0.04)));
    }

    canvas.addEventListener("pointerup", (e) => {
      if (!touchStart || (state !== STATE.PLAYING && state !== STATE.PAUSED)) return;
      const dx = e.clientX - touchStart.x;
      const dy = e.clientY - touchStart.y;
      touchStart = null;
      const adx = Math.abs(dx);
      const ady = Math.abs(dy);
      const th = swipeThreshold(); // 触控阈值：太短当作点击
      if (adx < th && ady < th) return;

      // 斜滑忽略：如果横纵差不明显，则不触发（避免误触）
      const min = Math.min(adx, ady);
      if (min > 0) {
        const ratio = Math.max(adx, ady) / min;
        if (ratio < 1.15) return;
      }

      if (adx > ady) setDirection(dx > 0 ? "right" : "left", "touch");
      else setDirection(dy > 0 ? "down" : "up", "touch");
    });

    if (IS_TEST_MODE) {
      runSelfTests();
    } else {
      showOverlay("准备好了吗？", "用方向键或 WASD 移动小蛇，吃到苹果会变长哦～", "开始游戏");
      draw();
    }
  </script>
</body>
</html>
