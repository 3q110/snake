<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>萌萌贪吃蛇</title>
  <meta name="version" content="snake.1.0.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #fff5f8;
      --panel: #ffffff;
      --accent: #ff6b9d;
      --accent-dark: #e84d87;
      --snake: #5dd39e;
      --snake-head: #3cb878;
      --food: #ff9f43;
      --text: #4a3f55;
      --muted: #9b8aa8;
      --shadow: 0 8px 24px rgba(255, 107, 157, 0.18);
      --grid-line: rgba(255, 182, 193, 0.35);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100dvh;
      font-family: "Nunito", "Segoe UI", sans-serif;
      background: var(--bg);
      background-image:
        radial-gradient(circle at 10% 20%, #ffe0ec 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, #dff7ec 0%, transparent 40%);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
      user-select: none;
    }

    h1 {
      font-size: clamp(1.5rem, 5vw, 2rem);
      font-weight: 800;
      color: var(--accent);
      text-shadow: 2px 2px 0 #ffd6e5;
      margin-bottom: 8px;
      letter-spacing: 0.02em;
    }

    .hud {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 12px;
    }

    .score-pill {
      background: var(--panel);
      border: 3px solid #ffd6e5;
      border-radius: 999px;
      padding: 6px 18px;
      font-weight: 800;
      font-size: 0.95rem;
      box-shadow: var(--shadow);
    }

    .score-pill span {
      color: var(--accent);
    }

    .difficulty-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 12px;
    }

    .difficulty-bar label {
      width: 100%;
      text-align: center;
      font-size: 0.8rem;
      font-weight: 800;
      color: var(--muted);
    }

    .diff-btn {
      font-family: inherit;
      font-weight: 800;
      font-size: 0.9rem;
      border: 3px solid #ffd6e5;
      border-radius: 999px;
      padding: 8px 16px;
      cursor: pointer;
      background: var(--panel);
      color: var(--text);
      box-shadow: 0 3px 0 #ffc4d8;
      transition: transform 0.1s, box-shadow 0.1s, background 0.15s, color 0.15s;
    }

    .diff-btn:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #ffc4d8;
    }

    .diff-btn.active {
      background: linear-gradient(180deg, #ff8fb8 0%, var(--accent) 100%);
      color: #fff;
      border-color: var(--accent);
      box-shadow: 0 3px 0 var(--accent-dark);
    }

    .diff-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .game-wrap {
      position: relative;
      background: var(--panel);
      border: 4px solid #ffd6e5;
      border-radius: 20px;
      padding: 10px;
      box-shadow: var(--shadow);
    }

    canvas {
      display: block;
      width: 100%;
      max-width: min(800px, calc(100vw - 32px));
      height: auto;
      aspect-ratio: 1;
      border-radius: 12px;
      background: #fffafc;
      touch-action: none;
    }

    .overlay {
      position: absolute;
      inset: 10px;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: rgba(255, 250, 252, 0.88);
      text-align: center;
      padding: 20px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .overlay h2 {
      font-size: 1.4rem;
      color: var(--accent);
    }

    .overlay p {
      color: var(--muted);
      font-weight: 600;
      line-height: 1.5;
      max-width: 260px;
    }

    .btn {
      font-family: inherit;
      font-weight: 800;
      font-size: 1rem;
      border: none;
      border-radius: 999px;
      padding: 12px 28px;
      cursor: pointer;
      background: linear-gradient(180deg, #ff8fb8 0%, var(--accent) 100%);
      color: #fff;
      box-shadow: 0 4px 0 var(--accent-dark);
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .btn:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 var(--accent-dark);
    }

    .hint {
      margin-top: 12px;
      font-size: 0.85rem;
      color: var(--muted);
      font-weight: 600;
      text-align: center;
    }

    .hint kbd {
      display: inline-block;
      background: #fff;
      border: 2px solid #ffd6e5;
      border-radius: 6px;
      padding: 1px 6px;
      font-family: inherit;
      font-size: 0.8rem;
    }

    .dpad {
      display: none;
      margin-top: 16px;
      grid-template-columns: repeat(3, 64px);
      grid-template-rows: repeat(3, 64px);
      gap: 8px;
      justify-content: center;
    }

    .dpad-btn {
      width: 64px;
      height: 64px;
      border: none;
      border-radius: 16px;
      background: #fff;
      border: 3px solid #ffd6e5;
      font-size: 1.5rem;
      color: var(--accent);
      box-shadow: 0 4px 0 #ffc4d8;
      cursor: pointer;
      touch-action: manipulation;
    }

    .dpad-btn:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #ffc4d8;
      background: #fff0f5;
    }

    .dpad-btn.empty {
      visibility: hidden;
      pointer-events: none;
    }

    @media (hover: none) and (pointer: coarse) {
      .dpad { display: grid; }
      .hint-desktop { display: none; }
    }

    @media (min-width: 520px) {
      .dpad { display: none !important; }
    }
  </style>
</head>
<body>
  <h1>🐍 萌萌贪吃蛇</h1>

  <div class="difficulty-bar" role="group" aria-label="难度选择">
    <label>选择难度</label>
    <button type="button" class="diff-btn" data-diff="easy">容易</button>
    <button type="button" class="diff-btn active" data-diff="medium">中等</button>
    <button type="button" class="diff-btn" data-diff="hard">困难</button>
  </div>

  <div class="hud">
    <div class="score-pill">得分 <span id="score">0</span></div>
    <div class="score-pill">最高 <span id="highScore">0</span></div>
  </div>

  <div class="game-wrap">
    <canvas id="game" aria-label="贪吃蛇游戏区域"></canvas>

    <div id="overlay" class="overlay visible">
      <h2 id="overlayTitle">准备好了吗？</h2>
      <p id="overlayMsg">用方向键或 WASD 移动小蛇，吃到苹果会变长哦～</p>
      <button type="button" class="btn" id="actionBtn">开始游戏</button>
    </div>
  </div>

  <p class="hint hint-desktop">键盘：<kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> 或 <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> · <kbd>空格</kbd> 暂停</p>

  <div class="dpad" id="dpad" aria-label="方向控制">
    <button type="button" class="dpad-btn empty" tabindex="-1" aria-hidden="true"></button>
    <button type="button" class="dpad-btn" data-dir="up" aria-label="向上">▲</button>
    <button type="button" class="dpad-btn empty" tabindex="-1" aria-hidden="true"></button>
    <button type="button" class="dpad-btn" data-dir="left" aria-label="向左">◀</button>
    <button type="button" class="dpad-btn empty" tabindex="-1" aria-hidden="true"></button>
    <button type="button" class="dpad-btn" data-dir="right" aria-label="向右">▶</button>
    <button type="button" class="dpad-btn empty" tabindex="-1" aria-hidden="true"></button>
    <button type="button" class="dpad-btn" data-dir="down" aria-label="向下">▼</button>
    <button type="button" class="dpad-btn empty" tabindex="-1" aria-hidden="true"></button>
  </div>

  <script>
    const GRID = 20;
    const CELL = 40;
    const CANVAS_SIZE = GRID * CELL;
    const FOOD_SCORE = 10;

    const DIFFICULTY = {
      easy:   { label: "容易", initialSpeed: 380, minSpeed: 200, speedStep: 2 },
      medium: { label: "中等", initialSpeed: 300, minSpeed: 160, speedStep: 4 },
      hard:   { label: "困难", initialSpeed: 220, minSpeed: 120, speedStep: 6 },
    };

    const canvas = document.getElementById("game");
    canvas.width = CANVAS_SIZE;
    canvas.height = CANVAS_SIZE;
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const highScoreEl = document.getElementById("highScore");
    const overlay = document.getElementById("overlay");
    const overlayTitle = document.getElementById("overlayTitle");
    const overlayMsg = document.getElementById("overlayMsg");
    const actionBtn = document.getElementById("actionBtn");
    const diffBtns = document.querySelectorAll(".diff-btn");

    const STATE = { MENU: "menu", PLAYING: "playing", PAUSED: "paused", OVER: "over" };

    let state = STATE.MENU;
    let difficulty = localStorage.getItem("snake_difficulty") || "medium";
    if (!DIFFICULTY[difficulty]) difficulty = "medium";
    let snake = [];
    let direction = { x: 1, y: 0 };
    let nextDirection = { x: 1, y: 0 };
    let food = { x: 0, y: 0 };
    let score = 0;
    let highScore = 0;
    let moveInterval = DIFFICULTY[difficulty].initialSpeed;
    let lastTick = 0;
    let animId = 0;
    let foodPulse = 0;

    const audio = { ctx: null };

    function ensureAudio() {
      if (!audio.ctx) {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (Ctx) audio.ctx = new Ctx();
      }
      if (audio.ctx?.state === "suspended") audio.ctx.resume();
    }

    function playTone(freq, duration, type = "sine", volume = 0.15, when = 0) {
      if (!audio.ctx) return;
      const t = audio.ctx.currentTime + when;
      const osc = audio.ctx.createOscillator();
      const gain = audio.ctx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, t);
      gain.gain.setValueAtTime(volume, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
      osc.connect(gain);
      gain.connect(audio.ctx.destination);
      osc.start(t);
      osc.stop(t + duration + 0.02);
    }

    function sfxEat() {
      playTone(520, 0.06, "sine", 0.12);
      playTone(780, 0.08, "sine", 0.1, 0.05);
    }

    function sfxDie() {
      playTone(220, 0.12, "sawtooth", 0.1);
      playTone(140, 0.2, "sawtooth", 0.08, 0.1);
    }

    function sfxStart() {
      playTone(440, 0.07, "sine", 0.1);
      playTone(660, 0.09, "sine", 0.1, 0.07);
    }

    function sfxPause() {
      playTone(330, 0.05, "triangle", 0.08);
    }

    function sfxRecord() {
      [523, 659, 784, 1047].forEach((f, i) => playTone(f, 0.1, "sine", 0.1, i * 0.09));
    }

    function highScoreKey() {
      return `snake_high_${difficulty}`;
    }

    function loadHighScore() {
      highScore = Number(localStorage.getItem(highScoreKey()) || 0);
      highScoreEl.textContent = highScore;
    }

    function getDiffConfig() {
      return DIFFICULTY[difficulty];
    }

    function updateDiffButtons() {
      const canChange = state === STATE.MENU || state === STATE.OVER;
      diffBtns.forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.diff === difficulty);
        btn.disabled = !canChange;
      });
    }

    function setDifficulty(key) {
      if (!DIFFICULTY[key] || key === difficulty) return;
      if (state !== STATE.MENU && state !== STATE.OVER) return;
      difficulty = key;
      localStorage.setItem("snake_difficulty", difficulty);
      loadHighScore();
      updateDiffButtons();
      playTone(400, 0.04, "triangle", 0.06);
    }

    loadHighScore();
    updateDiffButtons();

    const DIR = {
      up: { x: 0, y: -1 },
      down: { x: 0, y: 1 },
      left: { x: -1, y: 0 },
      right: { x: 1, y: 0 },
    };

    const KEY_MAP = {
      ArrowUp: "up", ArrowDown: "down", ArrowLeft: "left", ArrowRight: "right",
      w: "up", s: "down", a: "left", d: "right",
      W: "up", S: "down", A: "left", D: "right",
    };

    function isOpposite(a, b) {
      return a.x === -b.x && a.y === -b.y;
    }

    function setDirection(name) {
      const d = DIR[name];
      if (!d) return;
      const base = state === STATE.PLAYING ? direction : nextDirection;
      if (!isOpposite(base, d)) nextDirection = { ...d };
    }

    function randomFood() {
      let pos;
      do {
        pos = {
          x: Math.floor(Math.random() * GRID),
          y: Math.floor(Math.random() * GRID),
        };
      } while (snake.some((s) => s.x === pos.x && s.y === pos.y));
      food = pos;
    }

    function resetGame() {
      const cfg = getDiffConfig();
      const mid = Math.floor(GRID / 2);
      snake = [
        { x: mid - 2, y: mid },
        { x: mid - 1, y: mid },
        { x: mid, y: mid },
      ];
      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };
      score = 0;
      moveInterval = cfg.initialSpeed;
      scoreEl.textContent = "0";
      randomFood();
    }

    function showOverlay(title, msg, btnText) {
      overlayTitle.textContent = title;
      overlayMsg.textContent = msg;
      actionBtn.textContent = btnText;
      overlay.classList.add("visible");
    }

    function hideOverlay() {
      overlay.classList.remove("visible");
    }

    function startGame() {
      ensureAudio();
      resetGame();
      state = STATE.PLAYING;
      hideOverlay();
      updateDiffButtons();
      sfxStart();
      lastTick = performance.now();
      cancelAnimationFrame(animId);
      animId = requestAnimationFrame(loop);
    }

    function gameOver() {
      state = STATE.OVER;
      updateDiffButtons();
      sfxDie();
      const diffLabel = getDiffConfig().label;
      if (score > highScore) {
        highScore = score;
        localStorage.setItem(highScoreKey(), String(highScore));
        highScoreEl.textContent = highScore;
        sfxRecord();
        showOverlay("哇！新纪录！🎉", `【${diffLabel}】本局 ${score} 分，太厉害啦！`, "再来一局");
      } else {
        showOverlay("哎呀撞到了！💫", `【${diffLabel}】本局 ${score} 分，再试一次吧～`, "再来一局");
      }
    }

    function togglePause() {
      if (state === STATE.PLAYING) {
        state = STATE.PAUSED;
        sfxPause();
        showOverlay("休息一下 ⏸", "按空格或点按钮继续", "继续游戏");
      } else if (state === STATE.PAUSED) {
        state = STATE.PLAYING;
        hideOverlay();
        sfxPause();
        lastTick = performance.now();
      }
    }

    function tick() {
      direction = { ...nextDirection };
      const head = snake[snake.length - 1];
      const newHead = { x: head.x + direction.x, y: head.y + direction.y };

      if (newHead.x < 0 || newHead.x >= GRID || newHead.y < 0 || newHead.y >= GRID) {
        gameOver();
        return;
      }

      if (snake.some((s) => s.x === newHead.x && s.y === newHead.y)) {
        gameOver();
        return;
      }

      snake.push(newHead);

      if (newHead.x === food.x && newHead.y === food.y) {
        const cfg = getDiffConfig();
        score += FOOD_SCORE;
        scoreEl.textContent = score;
        moveInterval = Math.max(cfg.minSpeed, moveInterval - cfg.speedStep);
        sfxEat();
        randomFood();
      } else {
        snake.shift();
      }
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function draw() {
      ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

      ctx.strokeStyle = "rgba(255, 182, 193, 0.35)";
      ctx.lineWidth = 1;
      for (let i = 0; i <= GRID; i++) {
        ctx.beginPath();
        ctx.moveTo(i * CELL, 0);
        ctx.lineTo(i * CELL, CANVAS_SIZE);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, i * CELL);
        ctx.lineTo(CANVAS_SIZE, i * CELL);
        ctx.stroke();
      }

      foodPulse += 0.08;
      const pulse = 1 + Math.sin(foodPulse) * 0.08;
      const fx = food.x * CELL + CELL / 2;
      const fy = food.y * CELL + CELL / 2;
      const fr = Math.max(1, CELL / 2 - 0.5) * pulse;

      ctx.fillStyle = "#ff9f43";
      ctx.beginPath();
      ctx.arc(fx, fy, fr, 0, Math.PI * 2);
      ctx.fill();
      if (CELL >= 8) {
        ctx.fillStyle = "#5dd39e";
        ctx.beginPath();
        ctx.ellipse(fx + fr * 0.3, fy - fr * 0.9, fr * 0.35, fr * 0.25, -0.4, 0, Math.PI * 2);
        ctx.fill();
      }

      const pad = Math.max(1, CELL * 0.15);
      const corner = Math.max(1, CELL * 0.2);

      snake.forEach((seg, i) => {
        const isHead = i === snake.length - 1;
        const x = seg.x * CELL + pad;
        const y = seg.y * CELL + pad;
        const w = CELL - pad * 2;

        ctx.fillStyle = isHead ? "#3cb878" : "#5dd39e";
        roundRect(x, y, w, w, corner);
        ctx.fill();

        if (isHead && CELL >= 8) {
          const eyeR = CELL * 0.12;
          const pupilR = CELL * 0.06;
          const nudge = Math.max(1, CELL * 0.05);
          let ex1 = x + w * 0.35, ey1 = y + w * 0.35;
          let ex2 = x + w * 0.65, ey2 = y + w * 0.35;
          ex1 += (direction.x || 0) * nudge;
          ex2 += (direction.x || 0) * nudge;
          ey1 += (direction.y || 0) * nudge;
          ey2 += (direction.y || 0) * nudge;

          ctx.fillStyle = "#fff";
          ctx.beginPath();
          ctx.arc(ex1, ey1, eyeR, 0, Math.PI * 2);
          ctx.arc(ex2, ey2, eyeR, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#2d3436";
          ctx.beginPath();
          ctx.arc(ex1 + (direction.x || 0) * nudge, ey1 + (direction.y || 0) * nudge, pupilR, 0, Math.PI * 2);
          ctx.arc(ex2 + (direction.x || 0) * nudge, ey2 + (direction.y || 0) * nudge, pupilR, 0, Math.PI * 2);
          ctx.fill();
        }
      });
    }

    function loop(now) {
      animId = requestAnimationFrame(loop);
      draw();

      if (state !== STATE.PLAYING) return;

      if (now - lastTick >= moveInterval) {
        lastTick = now;
        tick();
      }
    }

    document.addEventListener("keydown", (e) => {
      if (e.key === " " || e.code === "Space") {
        e.preventDefault();
        if (state === STATE.PLAYING || state === STATE.PAUSED) togglePause();
        return;
      }

      const dir = KEY_MAP[e.key];
      if (dir) {
        e.preventDefault();
        if (state === STATE.PLAYING || state === STATE.PAUSED) setDirection(dir);
      }
    });

    actionBtn.addEventListener("click", () => {
      ensureAudio();
      if (state === STATE.MENU || state === STATE.OVER) startGame();
      else if (state === STATE.PAUSED) togglePause();
    });

    diffBtns.forEach((btn) => {
      btn.addEventListener("click", () => {
        ensureAudio();
        setDifficulty(btn.dataset.diff);
      });
    });

    document.querySelectorAll(".dpad-btn[data-dir]").forEach((btn) => {
      const handler = (e) => {
        e.preventDefault();
        if (state === STATE.PLAYING || state === STATE.PAUSED) setDirection(btn.dataset.dir);
      };
      btn.addEventListener("pointerdown", handler);
    });

    let touchStart = null;
    canvas.addEventListener("pointerdown", (e) => {
      touchStart = { x: e.clientX, y: e.clientY };
    });
    canvas.addEventListener("pointerup", (e) => {
      if (!touchStart || (state !== STATE.PLAYING && state !== STATE.PAUSED)) return;
      const dx = e.clientX - touchStart.x;
      const dy = e.clientY - touchStart.y;
      touchStart = null;
      if (Math.abs(dx) < 24 && Math.abs(dy) < 24) return;
      if (Math.abs(dx) > Math.abs(dy)) setDirection(dx > 0 ? "right" : "left");
      else setDirection(dy > 0 ? "down" : "up");
    });

    showOverlay("准备好了吗？", "用方向键或 WASD 移动小蛇，吃到苹果会变长哦～", "开始游戏");
    draw();
  </script>
</body>
</html>
